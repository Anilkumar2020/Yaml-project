apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      role: nfs-server
  template:
    metadata:
      labels:
        role: nfs-server
    spec:
      containers:
      - name: "nfs-server"
        image: "gcr.io/ecosystem-core/unilog/application/nfs-gcloud:master"
        ports:
          - name: nfs
            containerPort: 2049
          - name: mountd
            containerPort: 20048
          - name: rpcbind
            containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: "/exports"
            name: wordpress-persistent
      volumes:
        - name: wordpress-persistent
          gcePersistentDisk:
            pdName: data-store
            fsType: ext4
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: wordpress
spec:
  ports:
    - name: nfs
      port: 2049
    - name: mountd
      port: 20048
    - name: rpcbind
      port: 111
  selector:
    role: nfs-server
