apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-store
  namespace: wordpress
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: nfs-server.wordpress.svc.cluster.local
    path: "/prod"
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: data-store
  namespace: wordpress
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 60Gi
